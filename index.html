<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARAM ONE PRO | AI & Design Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide-react"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@100..900&display=swap');
        body { font-family: 'Noto Sans Arabic', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .canvas-dot { background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 30px 30px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        // استخراج الأيقونات من مكتبة Lucide المخصصة لـ React
        const { 
            Menu, Plus, MessageSquare, Settings, Send, User, Sparkles, 
            Moon, Sun, Image: ImageIcon, Palette, Trash2, Download, 
            Layers, Type, Square, Circle, Zap, Share2, X 
        } = lucide;

        function App() {
            const [activeTab, setActiveTab] = useState('chat');
            const [messages, setMessages] = useState([{ role: 'model', text: 'أهلاً بك في KARAM ONE PRO، كيف يمكنني مساعدتك اليوم؟' }]);
            const [inputValue, setInputValue] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [imagePrompt, setImagePrompt] = useState('');
            const [generatedImages, setGeneratedImages] = useState([]);
            const [elements, setElements] = useState([]);
            const [selectedElement, setSelectedElement] = useState(null);
            const messagesEndRef = useRef(null);
            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            const handleSendMessage = async () => {
                if (!inputValue.trim() || isLoading) return;
                const userText = inputValue;
                setMessages(prev => [...prev, { role: 'user', text: userText }]);
                setInputValue('');
                setIsLoading(true);

                try {
                    // تحديث الموديل إلى 1.5 flash لضمان الاستقرار
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userText }] }],
                            generationConfig: { temperature: 0.7, maxOutputTokens: 800 }
                        })
                    });
                    const data = await response.json();
                    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "عذراً، واجهت مشكلة في معالجة طلبك.";
                    setMessages(prev => [...prev, { role: 'model', text: reply }]);
                } catch (error) {
                    setMessages(prev => [...prev, { role: 'model', text: "خطأ: تأكد من صحة مفتاح الـ API واتصالك بالإنترنت." }]);
                } finally {
                    setIsLoading(false);
                }
            };

            const addElement = (type) => {
                const newEl = { 
                    id: Date.now(), 
                    type, 
                    x: 50, 
                    y: 50, 
                    width: type === 'text' ? 'auto' : 100, 
                    height: type === 'text' ? 'auto' : 100, 
                    color: '#3b82f6', 
                    text: type === 'text' ? 'انقر للتعديل' : '' 
                };
                setElements([...elements, newEl]);
                setSelectedElement(newEl);
            };

            return (
                <div className={`flex h-screen overflow-hidden ${isDarkMode ? 'bg-[#0a0a0b] text-white' : 'bg-gray-50 text-gray-900'}`}>
                    
                    {/* Sidebar */}
                    <aside className={`transition-all duration-500 ease-in-out ${isSidebarOpen ? 'w-72' : 'w-0'} flex flex-col border-l border-white/10 glass z-20`}>
                        <div className="p-8 flex-1 overflow-y-auto custom-scrollbar">
                            <div className="flex items-center gap-3 mb-10">
                                <div className="p-2 bg-blue-600 rounded-lg"><Sparkles size={24} className="text-white" /></div>
                                <h1 className="text-xl font-bold tracking-tighter whitespace-nowrap">KARAM ONE PRO</h1>
                            </div>
                            
                            <nav className="space-y-2">
                                <SidebarItem active={activeTab === 'chat'} onClick={() => setActiveTab('chat')} icon={<MessageSquare size={20}/>} label="المساعد الذكي" />
                                <SidebarItem active={activeTab === 'generate'} onClick={() => setActiveTab('generate')} icon={<ImageIcon size={20}/>} label="توليد الصور" />
                                <SidebarItem active={activeTab === 'studio'} onClick={() => setActiveTab('studio')} icon={<Palette size={20}/>} label="الاستوديو الإبداعي" />
                            </nav>
                        </div>
                        
                        <div className="p-4 border-t border-white/10">
                            <button onClick={() => setIsDarkMode(!isDarkMode)} className="flex items-center gap-3 p-3 w-full hover:bg-white/5 rounded-xl transition-colors text-gray-400">
                                {isDarkMode ? <Sun size={20}/> : <Moon size={20}/>}
                                <span className="font-medium">{isDarkMode ? 'الوضع المضيء' : 'الوضع الليلي'}</span>
                            </button>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col relative">
                        <header className="h-16 flex items-center justify-between px-6 border-b border-white/5 glass z-10">
                            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 hover:bg-white/5 rounded-lg transition-transform active:scale-95">
                                <Menu size={20} />
                            </button>
                            <div className="flex items-center gap-4">
                                <div className="hidden md:flex items-center gap-2 bg-emerald-500/10 text-emerald-500 px-3 py-1 rounded-full text-xs font-bold border border-emerald-500/20">
                                    <div className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                                    متصل بالذكاء الاصطناعي
                                </div>
                                <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-600 to-purple-600 flex items-center justify-center font-bold shadow-lg shadow-blue-500/20">K</div>
                            </div>
                        </header>

                        <section className="flex-1 overflow-hidden relative">
                            {activeTab === 'chat' && (
                                <div className="h-full flex flex-col max-w-4xl mx-auto p-4 md:p-6">
                                    <div className="flex-1 overflow-y-auto space-y-6 mb-4 pr-2 custom-scrollbar">
                                        {messages.map((m, i) => (
                                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2`}>
                                                <div className={`p-4 rounded-2xl max-w-[85%] shadow-sm ${m.role === 'user' ? 'bg-blue-600 text-white' : 'glass'}`}>
                                                    <p className="text-sm leading-relaxed">{m.text}</p>
                                                </div>
                                            </div>
                                        ))}
                                        {isLoading && <div className="text-blue-500 flex gap-1 animate-pulse"><Sparkles size={16}/> جاري التفكير...</div>}
                                        <div ref={messagesEndRef} />
                                    </div>
                                    <div className="glass p-2 rounded-2xl flex gap-2 items-center focus-within:ring-2 ring-blue-500/50 transition-all">
                                        <input 
                                            className="flex-1 bg-transparent border-none outline-none p-3 text-sm" 
                                            placeholder="اسأل KARAM PRO عن أي شيء..." 
                                            value={inputValue} 
                                            onChange={e => setInputValue(e.target.value)} 
                                            onKeyDown={e => e.key === 'Enter' && handleSendMessage()} 
                                        />
                                        <button onClick={handleSendMessage} className="p-3 bg-blue-600 hover:bg-blue-500 rounded-xl transition-all active:scale-90">
                                            <Send size={18} className="text-white" />
                                        </button>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'studio' && (
                                <div className="h-full flex flex-col md:flex-row">
                                    <div className="w-full md:w-20 border-l border-white/10 glass flex md:flex-col items-center justify-center py-4 gap-6">
                                        <ToolbarBtn onClick={() => addElement('rect')} icon={<Square size={24}/>} />
                                        <ToolbarBtn onClick={() => addElement('circle')} icon={<Circle size={24}/>} />
                                        <ToolbarBtn onClick={() => addElement('text')} icon={<Type size={24}/>} />
                                        <div className="h-px w-10 bg-white/10 hidden md:block"></div>
                                        <ToolbarBtn onClick={() => setElements([])} icon={<Trash2 size={24} className="text-red-400"/>} />
                                    </div>
                                    <div className="flex-1 bg-[#121214] canvas-dot flex items-center justify-center p-4 md:p-10 relative overflow-auto custom-scrollbar">
                                        <div className="bg-white rounded-lg shadow-2xl relative overflow-hidden" style={{ width: '100%', maxWidth: '800px', height: '500px' }}>
                                            {elements.map(el => (
                                                <div 
                                                    key={el.id} 
                                                    onClick={() => setSelectedElement(el)}
                                                    className={`absolute cursor-move transition-shadow ${selectedElement?.id === el.id ? 'ring-2 ring-blue-500 shadow-xl' : ''}`}
                                                    style={{ 
                                                        left: el.x, 
                                                        top: el.y, 
                                                        width: el.width, 
                                                        height: el.height, 
                                                        backgroundColor: el.type === 'text' ? 'transparent' : el.color, 
                                                        borderRadius: el.type === 'circle' ? '50%' : '4px',
                                                        display: 'flex',
                                                        alignItems: 'center',
                                                        justifyContent: 'center',
                                                        color: '#000'
                                                    }}
                                                >
                                                    {el.type === 'text' && <span className="font-bold text-lg p-2">{el.text}</span>}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* التبويبات الأخرى تضاف هنا بنفس النمط */}
                        </section>
                    </main>
                </div>
            );
        }

        // مكونات فرعية لتحسين نظافة الكود
        function SidebarItem({ active, onClick, icon, label }) {
            return (
                <button onClick={onClick} className={`w-full flex items-center gap-3 p-4 rounded-2xl transition-all ${active ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/20 scale-[1.02]' : 'hover:bg-white/5 text-gray-400'}`}>
                    {icon} <span className="font-semibold">{label}</span>
                </button>
            );
        }

        function ToolbarBtn({ onClick, icon }) {
            return (
                <button onClick={onClick} className="p-3 hover:bg-white/10 rounded-2xl text-gray-400 hover:text-white transition-all active:scale-90">
                    {icon}
                </button>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
